version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: faslbot-backend:latest
    container_name: faslbot_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/serviceAccountKey.json
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - SMS_DEMO_TO_NUMBER=${SMS_DEMO_TO_NUMBER}
      - SMS_MODE=${SMS_MODE:-mock}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BACKEND_PORT=8000
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    image: faslbot-frontend:latest
    container_name: faslbot_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  app_data:
